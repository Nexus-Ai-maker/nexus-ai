<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS - Admin Dashboard</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh;}
        
        /* Navbar */
        .navbar { background: #1e293b; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
        .navbar h2 { margin: 0; font-size: 20px; color: #38bdf8; letter-spacing: 1px; }
        .logout-btn { background: #ef4444; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        /* Login Section */
        #login-section { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #0f172a; }
        .login-box { background: #1e293b; padding: 40px; border-radius: 12px; text-align: center; border: 1px solid #334155; }
        .login-box h3 { color: #f8fafc; margin-top: 0; }
        .login-btn { background: #3b82f6; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 20px; transition: 0.2s;}
        .login-btn:hover { background: #2563eb; }
        
        /* ⚠️ ပြင်ဆင်ချက် ၁: TAB BUTTONS စနစ် (ဘယ်/ညာ ခလုတ်များ) */
        .tabs-container { display: flex; background: #1e293b; padding: 15px 20px 0; border-bottom: 1px solid #334155; gap: 10px; }
        .tab-btn { flex: 1; padding: 12px 10px; background: #0f172a; color: #94a3b8; border: 1px solid #334155; border-bottom: none; border-radius: 10px 10px 0 0; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.3s; text-align: center; }
        .tab-btn.active { background: #38bdf8; color: #0f172a; border-color: #38bdf8; }
        
        /* Content Area Container */
        .content-area { flex: 1; position: relative; overflow: hidden; background: #0f172a; }
        
        /* Left Panel: VIP Requests */
        .vip-panel { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 20px; overflow-y: auto; display: none; flex-direction: column; }
        .vip-panel.active { display: flex; }
        
        .request-card { background: #1e293b; padding: 20px; border-radius: 10px; border: 1px solid #334155; margin-bottom: 20px; }
        .user-info { font-weight: bold; color: #94a3b8; margin-bottom: 10px; font-size: 14px;}
        .user-prompt { background: #0f172a; padding: 12px; border-radius: 6px; margin-bottom: 15px; color: #e2e8f0; border-left: 4px solid #3b82f6;}
        .img-preview { max-width: 100%; max-height: 200px; border-radius: 6px; margin-bottom: 10px; object-fit: contain; background: #000;}
        textarea { width: 100%; height: 80px; padding: 10px; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; margin-bottom: 10px; resize: none;}
        .reply-btn { background: #10b981; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s;}
        .reply-btn:hover { background: #059669; }
        
        /* Right Panel: API Tester */
        .api-panel { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; background: #1e293b; }
        .api-panel.active { display: flex; }
        
        .chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #0f172a; }
        .bubble { padding: 12px 16px; border-radius: 12px; max-width: 85%; font-size: 14px; line-height: 1.5; word-wrap: break-word;}
        .admin-msg { background: #3b82f6; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai-msg { background: #334155; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #475569; }
        
        .engine-tag { display: inline-block; font-size: 11px; color: #f59e0b; margin-top: 8px; font-weight: bold; background: rgba(0,0,0,0.3); padding: 4px 8px; border-radius: 4px; border: 1px dashed rgba(245, 158, 11, 0.5);}
        
        .chat-input-area { padding: 15px; background: #1e293b; border-top: 1px solid #334155; display: flex; gap: 10px; }
        .chat-input-area input { flex: 1; padding: 12px 15px; border-radius: 20px; border: 1px solid #475569; background: #0f172a; color: white; outline: none; font-size: 15px;}
        .chat-input-area button { background: #38bdf8; color: #0f172a; border: none; padding: 10px 18px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-section">
        <div class="login-box">
            <h3>🛡️ NEXUS Admin Gateway</h3>
            <p style="color: #94a3b8; font-size: 14px;">Authorized Personnel Only</p>
            <button class="login-btn" onclick="adminLogin()">Authenticate with Google</button>
        </div>
    </div>

    <div id="admin-content-wrapper" style="display: none; height: 100%; flex-direction: column;">
        
        <div class="navbar">
            <h2>NEXUS Admin</h2>
            <button class="logout-btn" onclick="adminLogout()">Logout</button>
        </div>
        
        <div class="tabs-container">
            <button class="tab-btn active" id="tab-vip" onclick="switchTab('vip')">💎 VIP Requests</button>
            <button class="tab-btn" id="tab-api" onclick="switchTab('api')">⚡ API Tester</button>
        </div>
        
        <div class="content-area">
            
            <div class="vip-panel active" id="panel-vip">
                <div id="requests-container">
                    <p style="color: #64748b; text-align: center; margin-top: 30px;">Loading requests...</p>
                </div>
            </div>
            
            <div class="api-panel" id="panel-api">
                <div class="chat-box" id="admin-chat-box">
                    <div class="bubble ai-msg">Welcome Admin! I am online. Ask me anything to test the current API status.</div>
                </div>
                
                <div class="chat-input-area">
                    <input type="text" id="admin-test-input" placeholder="Type prompt to test API..." onkeypress="if(event.key === 'Enter') testAPI()" autocomplete="off">
                    <button onclick="testAPI()">Send</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBuI_N7UY3HzLC1q4bTbr0pIjutn7oCez0",
            authDomain: "nexus-36961.firebaseapp.com",
            projectId: "nexus-36961",
            storageBucket: "nexus-36961.firebasestorage.app",
            messagingSenderId: "818963537476",
            appId: "1:818963537476:web:83e8b69fdf067001e62611"
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();
        const auth = firebase.auth();

        // ⚠️ ADMIN GMAIL 
        const ADMIN_EMAIL = "newtruckermyanmar1010@gmail.com"; 
        
        // ⚠️ BACKEND CLOUDFLARE URL
        const BACKEND_URL = "https://nexus-backend.minthantaung2027.workers.dev";

        // --- AUTHENTICATION ---
        auth.onAuthStateChanged(user => {
            if (user) {
                if (user.email === ADMIN_EMAIL) {
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('admin-content-wrapper').style.display = 'flex';
                    loadRequests(); 
                } else {
                    alert("Access Denied! Admin only.");
                    auth.signOut();
                }
            } else {
                document.getElementById('login-section').style.display = 'flex';
                document.getElementById('admin-content-wrapper').style.display = 'none';
            }
        });

        function adminLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(err => alert("Login Error: " + err.message));
        }
        function adminLogout() {
            if(confirm("Logout ထွက်မှာ သေချာပါသလား?")) auth.signOut();
        }

        // --- ⚠️ ပြင်ဆင်ချက် ၃: TAB လွှဲပြောင်းပေးသည့် Function ---
        function switchTab(tabId) {
            // Remove active class from all
            document.getElementById('tab-vip').classList.remove('active');
            document.getElementById('tab-api').classList.remove('active');
            document.getElementById('panel-vip').classList.remove('active');
            document.getElementById('panel-api').classList.remove('active');

            // Add active class to selected
            document.getElementById('tab-' + tabId).classList.add('active');
            document.getElementById('panel-' + tabId).classList.add('active');
        }

        // --- VIP REQUESTS LOGIC ---
        function loadRequests() {
            const container = document.getElementById('requests-container');
            db.collection("pro_requests").where("status", "==", "pending").orderBy("timestamp", "asc")
              .onSnapshot((snapshot) => {
                  container.innerHTML = "";
                  if(snapshot.empty) { container.innerHTML = "<p style='color: #64748b; text-align: center; margin-top: 30px;'>No new VIP requests.</p>"; return; }
                  
                  snapshot.forEach((doc) => {
                      const data = doc.data(); const docId = doc.id;
                      let html = `
                        <div class="request-card" id="card-${docId}">
                            <div class="user-info">👤 ${data.userName} (${data.userEmail})</div>
                            <div class="user-prompt">${data.userPrompt || '(Image Request Only)'}</div>
                            ${data.userImage ? `<img src="${data.userImage}" class="img-preview">` : ''}
                            
                            <textarea id="reply-text-${docId}" placeholder="Admin Reply..."></textarea>
                            <input type="file" id="reply-img-${docId}" accept="image/*" style="margin-bottom: 15px; color: #94a3b8;"><br>
                            <button class="reply-btn" onclick="sendReply('${docId}')">Send Reply to User</button>
                        </div>
                      `;
                      container.innerHTML += html;
                  });
              }, (error) => { alert("Error loading requests: " + error.message); });
        }

        function sendReply(docId) {
            const replyText = document.getElementById(`reply-text-${docId}`).value;
            const fileInput = document.getElementById(`reply-img-${docId}`);
            if(!replyText && fileInput.files.length === 0) { alert("Please enter text or attach an image."); return; }

            const updateData = { adminReply: replyText, status: "replied", repliedAt: firebase.firestore.FieldValue.serverTimestamp() };
            document.querySelector(`#card-${docId} button`).innerText = "Sending...";

            if (fileInput.files.length > 0) {
                const reader = new FileReader();
                reader.onload = (e) => { updateData.adminImage = e.target.result; pushToFirebase(docId, updateData); };
                reader.readAsDataURL(fileInput.files[0]);
            } else { pushToFirebase(docId, updateData); }
        }

        function pushToFirebase(docId, updateData) {
            db.collection("pro_requests").doc(docId).update(updateData).catch((error) => { alert("Error sending reply: " + error); });
        }

        // --- API TESTER LOGIC ---
        function appendAdminChat(text, isUser, engineName = null) {
            const chatBox = document.getElementById("admin-chat-box");
            let div = document.createElement("div");
            div.className = `bubble ${isUser ? 'admin-msg' : 'ai-msg'}`;
            
            let displayText = text.replace(/\n/g, '<br>');
            
            if (!isUser && engineName) {
                displayText += `<br><span class="engine-tag">🛡️ Active Engine: ${engineName}</span>`;
            }
            
            div.innerHTML = displayText;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        async function testAPI() {
            const input = document.getElementById("admin-test-input");
            const text = input.value.trim();
            if (!text) return;
            
            appendAdminChat(text, true);
            input.value = "";
            const loadingBubble = appendAdminChat("Testing Engine...", false);
            
            try {
                const requestBody = { 
                    model: 'gemini-1.5-flash', 
                    contents: [{ role: "user", parts: [{ text: text }] }],
                    aiMode: 'Flash'
                };
                
                const response = await fetch(BACKEND_URL, { 
                    method: "POST", 
                    headers: { "Content-Type": "application/json" }, 
                    body: JSON.stringify(requestBody) 
                });
                
                const data = await response.json();
                loadingBubble.remove();
                
                if (data.candidates && data.candidates.length > 0) {
                    const aiText = data.candidates[0].content.parts[0].text;
                    const engineName = data.ai_source || "Unknown Engine"; 
                    
                    appendAdminChat(aiText, false, engineName);
                } else {
                    appendAdminChat("⚠️ Backend Error: " + JSON.stringify(data), false);
                }
            } catch (err) {
                loadingBubble.remove();
                appendAdminChat("⚠️ Network/Fetch Error: " + err.message, false);
            }
        }
    </script>
</body>
</html>
