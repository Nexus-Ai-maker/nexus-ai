<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXIS | Master Admin Panel</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        /* --- 🔒 ANTI-THEFT CSS --- */
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0f172a; color: #e2e8f0; margin: 0; padding: 0; 
            display: flex; flex-direction: column; height: 100vh;
            -webkit-user-select: none; -ms-user-select: none; user-select: none; 
        }
        input, textarea, select { -webkit-user-select: text; -ms-user-select: text; user-select: text; }

        /* Navbar */
        .navbar { background: #1e293b; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
        .navbar h2 { margin: 0; font-size: 20px; color: #38bdf8; letter-spacing: 1px; font-weight: bold; }
        .navbar h2 span { color: #d6bcfa; font-weight: 300; }
        .logout-btn { background: #ef4444; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        /* Login Section */
        #login-section { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #0f172a; }
        .login-box { background: #1e293b; padding: 40px; border-radius: 12px; text-align: center; border: 1px solid #334155; }
        .login-box h3 { color: #f8fafc; margin-top: 0; }
        .login-btn { background: #3b82f6; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 20px; transition: 0.2s;}
        .login-btn:hover { background: #2563eb; }
        
        /* TAB BUTTONS */
        .tabs-container { display: flex; background: #1e293b; padding: 15px 20px 0; border-bottom: 1px solid #334155; gap: 10px; overflow-x: auto;}
        .tab-btn { flex: 1; padding: 12px 10px; background: #0f172a; color: #94a3b8; border: 1px solid #334155; border-bottom: none; border-radius: 10px 10px 0 0; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.3s; text-align: center; white-space: nowrap; }
        .tab-btn.active { background: #38bdf8; color: #0f172a; border-color: #38bdf8; }
        
        /* Content Area */
        .content-area { flex: 1; position: relative; overflow: hidden; background: #0f172a;}
        .tab-panel { display: none; flex-direction: column; height: 100%; overflow-y: auto;}
        .tab-panel.active { display: flex; }
        
        /* --- PANEL 1: User Limits --- */
        .users-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; width: 100%; padding: 20px;}
        .user-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .user-info { display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px;}
        .user-info img { width: 45px; height: 45px; border-radius: 50%; }
        .user-details { flex: 1; overflow: hidden;}
        .user-name { font-size: 16px; font-weight: bold; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .user-email { font-size: 12px; color: #8e8e8e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .plan-section { display: flex; justify-content: space-between; align-items: center; }
        .plan-section span { font-size: 14px; font-weight: bold; color: #a8c7fa;}
        .plan-select { background: rgba(0,0,0,0.5); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 5px 10px; border-radius: 8px; outline: none; }
        .feature-control { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); padding: 10px 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05);}
        .feature-name { font-size: 13px; color: #ccc; flex: 1;}
        .limit-input { width: 50px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 4px; border-radius: 6px; text-align: center; margin-right: 15px; outline: none;}
        
        .switch { position: relative; display: inline-block; width: 36px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(255,255,255,0.1); transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #38bdf8; }
        input:checked + .slider:before { transform: translateX(16px); }

        .save-btn { width: 100%; padding: 12px; background: #9f7aea; color: #fff; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 5px;}
        .save-btn:hover { background: #b794f4; transform: translateY(-2px);}
        .toast { position: fixed; bottom: 20px; right: 20px; background: #4ade80; color: #000; padding: 12px 20px; border-radius: 10px; font-weight: bold; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1000;}

        /* --- PANEL 3: API Tester --- */
        .api-container { padding: 20px; height: 100%; display: flex; flex-direction: column; }
        .chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #0f172a; border: 1px solid #334155; border-radius: 10px; margin-bottom: 15px;}
        .bubble { padding: 12px 16px; border-radius: 12px; max-width: 85%; font-size: 14px; line-height: 1.5; word-wrap: break-word;}
        .admin-msg { background: #3b82f6; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai-msg { background: #334155; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #475569; }
        .engine-tag { display: inline-block; font-size: 11px; color: #f59e0b; margin-top: 8px; font-weight: bold; background: rgba(0,0,0,0.3); padding: 4px 8px; border-radius: 4px; border: 1px dashed rgba(245, 158, 11, 0.5);}
        .chat-input-area { display: flex; gap: 10px; }
        .chat-input-area input { flex: 1; padding: 12px 15px; border-radius: 10px; border: 1px solid #475569; background: #1e293b; color: white; outline: none; font-size: 15px;}
        .chat-input-area button { background: #38bdf8; color: #0f172a; border: none; padding: 10px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; }

        /* --- 💬 PANEL 2: MESSENGER VIP CHAT (NEW) --- */
        .messenger-wrapper { display: flex; height: 100%; width: 100%; }
        
        /* Left Sidebar (User List) */
        .ms-sidebar { width: 320px; background: #1e293b; border-right: 1px solid #334155; display: flex; flex-direction: column; flex-shrink: 0;}
        @media (max-width: 768px) { .ms-sidebar { width: 100px; } .ms-user-details { display: none; } }
        .ms-header { padding: 15px 20px; font-weight: bold; color: #38bdf8; border-bottom: 1px solid #334155; }
        .ms-user-list { flex: 1; overflow-y: auto; }
        .ms-user-item { display: flex; align-items: center; gap: 15px; padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s;}
        .ms-user-item:hover, .ms-user-item.active { background: rgba(56, 189, 248, 0.1); border-left: 4px solid #38bdf8; }
        .ms-user-item img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover;}
        .ms-user-name { font-size: 15px; font-weight: bold; color: #fff; }
        .ms-user-email { font-size: 12px; color: #94a3b8; }
        
        /* Right Chat Area */
        .ms-chat-area { flex: 1; display: flex; flex-direction: column; background: #0f172a; position: relative;}
        .ms-chat-header { padding: 15px 20px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center;}
        .ms-active-user { display: flex; align-items: center; gap: 15px; }
        .ms-active-user img { width: 45px; height: 45px; border-radius: 50%; }
        .ms-active-name { font-size: 16px; font-weight: bold; color: #fff; }
        .ms-active-email { font-size: 13px; color: #94a3b8; }
        .trash-btn { background: transparent; border: 1px solid #ef4444; color: #ef4444; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 5px; transition: 0.2s;}
        .trash-btn:hover { background: #ef4444; color: #fff; }

        .ms-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .ms-bubble { padding: 12px 18px; border-radius: 15px; max-width: 75%; line-height: 1.5; word-wrap: break-word; font-size: 15px;}
        .ms-user-msg { background: #334155; align-self: flex-start; border-bottom-left-radius: 2px; color: #e2e8f0; border: 1px solid #475569;}
        .ms-admin-msg { background: rgba(214, 188, 250, 0.2); border: 1px solid #d6bcfa; align-self: flex-end; border-bottom-right-radius: 2px; color: #fff;}
        .ms-img { max-width: 250px; border-radius: 10px; margin-top: 5px; cursor: pointer;}
        
        .ms-input-area { padding: 15px 20px; background: #1e293b; border-top: 1px solid #334155; display: flex; gap: 10px; align-items: center;}
        .plus-btn { background: rgba(255,255,255,0.1); border: none; width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s;}
        .plus-btn:hover { background: rgba(255,255,255,0.2); }
        .plus-btn svg { width: 24px; height: 24px; stroke: #d6bcfa; fill: none; stroke-width: 2;}
        .ms-input-area input[type="text"] { flex: 1; padding: 15px 20px; border-radius: 25px; border: 1px solid #475569; background: #0f172a; color: white; outline: none; font-size: 15px;}
        .ms-send-btn { background: #38bdf8; color: #0f172a; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 15px;}

        /* Image Preview Box */
        .ms-preview-box { display: none; padding: 10px 20px; background: #1e293b; border-top: 1px solid #334155;}
        .ms-preview-inner { position: relative; display: inline-block;}
        .ms-preview-inner img { height: 60px; border-radius: 8px; border: 1px solid #475569;}
        .ms-remove-img { position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 12px; cursor: pointer;}

        .no-chat-selected { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #64748b;}
        .no-chat-selected svg { width: 64px; height: 64px; stroke: currentColor; fill: none; stroke-width: 1; margin-bottom: 15px;}
    </style>
</head>
<body>

    <div id="login-section">
        <div class="login-box">
            <h3>🛡️ NEXIS Admin Gateway</h3>
            <p style="color: #94a3b8; font-size: 14px;">Authorized Personnel Only</p>
            <button class="login-btn" onclick="adminLogin()">Authenticate with Google</button>
        </div>
    </div>

    <div id="admin-content-wrapper" style="display: none; height: 100%; flex-direction: column;">
        
        <div class="navbar">
            <h2>NEXIS <span>Admin Panel</span></h2>
            <button class="logout-btn" onclick="adminLogout()">Logout</button>
        </div>
        
        <div class="tabs-container">
            <button class="tab-btn active" id="tab-users" onclick="switchTab('users')">👥 User Limits</button>
            <button class="tab-btn" id="tab-vip" onclick="switchTab('vip')">💎 VIP Requests</button>
            <button class="tab-btn" id="tab-api" onclick="switchTab('api')">⚡ API Tester</button>
        </div>
        
        <div class="content-area">
            
            <div class="tab-panel active" id="panel-users">
                <div class="users-container" id="users-container">
                    <div style="text-align: center; width: 100%; color: #8e8e8e;">Loading users...</div>
                </div>
            </div>
            
            <div class="tab-panel" id="panel-vip" style="padding: 0;">
                <div class="messenger-wrapper">
                    
                    <div class="ms-sidebar">
                        <div class="ms-header">Chats</div>
                        <div class="ms-user-list" id="ms-user-list">
                            <div style="text-align: center; padding: 20px; color: #64748b;">Loading...</div>
                        </div>
                    </div>

                    <div class="ms-chat-area" id="ms-chat-area" style="display: none;">
                        <div class="ms-chat-header">
                            <div class="ms-active-user">
                                <img id="ms-active-img" src="">
                                <div>
                                    <div class="ms-active-name" id="ms-active-name">User Name</div>
                                    <div class="ms-active-email" id="ms-active-email">Email</div>
                                </div>
                            </div>
                            <button class="trash-btn" onclick="clearAdminChatHistory()">
                                <svg viewBox="0 0 24 24" style="width:16px; height:16px; fill:none; stroke:currentColor; stroke-width:2;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg> Clear
                            </button>
                        </div>
                        
                        <div class="ms-messages" id="ms-messages">
                            </div>

                        <div class="ms-preview-box" id="ms-preview-box">
                            <div class="ms-preview-inner">
                                <img id="ms-preview-img" src="">
                                <button class="ms-remove-img" onclick="removeAdminImage()">✖</button>
                            </div>
                        </div>

                        <div class="ms-input-area">
                            <button class="plus-btn" onclick="document.getElementById('admin-file-input').click()">
                                <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                            </button>
                            <input type="file" id="admin-file-input" accept="image/*" style="display:none;" onchange="handleAdminImageSelect(event)">
                            <input type="text" id="admin-chat-input" placeholder="Message to user..." autocomplete="off" onkeypress="if(event.key === 'Enter') sendAdminChatMsg()">
                            <button class="ms-send-btn" onclick="sendAdminChatMsg()">Send</button>
                        </div>
                    </div>

                    <div class="no-chat-selected" id="ms-no-chat">
                        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                        Select a user from the list to start chatting
                    </div>

                </div>
            </div>
            
            <div class="tab-panel" id="panel-api">
                <div class="api-container">
                    <div class="chat-box" id="admin-chat-box">
                        <div class="bubble ai-msg">Welcome Admin! I am online. Ask me anything to test the current API status.</div>
                    </div>
                    <div class="chat-input-area">
                        <input type="text" id="admin-test-input" placeholder="Type prompt to test API..." onkeypress="if(event.key === 'Enter') testAPI()" autocomplete="off">
                        <button onclick="testAPI()">Send Request</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="toast" id="toast">✅ Saved Successfully!</div>

    <script>
        // =========================================================
        // 🔒 ANTI-THEFT SYSTEM (Code ခိုးယူခွင့် ပိတ်ပင်ခြင်း)
        // =========================================================
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123) { return false; }
            if(e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) { return false; }
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { return false; }
        };

        // =========================================================
        // ⚙️ FIREBASE & SYSTEM LOGIC
        // =========================================================
        const firebaseConfig = {
            apiKey: "AIzaSyBuI_N7UY3HzLC1q4bTbr0pIjutn7oCez0",
            authDomain: "nexus-36961.firebaseapp.com",
            projectId: "nexus-36961",
            storageBucket: "nexus-36961.firebasestorage.app",
            messagingSenderId: "818963537476",
            appId: "1:818963537476:web:83e8b69fdf067001e62611"
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();
        const auth = firebase.auth();

        const ADMIN_EMAIL = "newtruckermyanmar1010@gmail.com"; 
        const BACKEND_URL = "https://nexus-backend.minthantaung2027.workers.dev";

        // Global Variables for Messenger
        let activeChatUid = null;
        let activeChatName = "";
        let activeChatEmail = "";
        let adminSelectedImage = null;
        let activeChatUnsubscribe = null;

        // --- AUTHENTICATION ---
        auth.onAuthStateChanged(user => {
            if (user) {
                if (user.email === ADMIN_EMAIL) {
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('admin-content-wrapper').style.display = 'flex';
                    loadUsers();
                    loadVipChatUsers(); 
                } else {
                    alert("Access Denied! Admin only.");
                    auth.signOut();
                }
            } else {
                document.getElementById('login-section').style.display = 'flex';
                document.getElementById('admin-content-wrapper').style.display = 'none';
            }
        });

        function adminLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(err => alert("Login Error: " + err.message));
        }
        function adminLogout() {
            if(confirm("Logout ထွက်မှာ သေချာပါသလား?")) auth.signOut();
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            document.getElementById('panel-' + tabId).classList.add('active');
        }

        // =========================================================
        // 👥 PANEL 1: USER LIMITS
        // =========================================================
        function loadUsers() {
            const usersContainer = document.getElementById('users-container');
            db.collection("users").onSnapshot((snapshot) => {
                usersContainer.innerHTML = '';
                if(snapshot.empty) {
                    usersContainer.innerHTML = '<div style="text-align: center; width: 100%; color: #8e8e8e;">No users found yet.</div>';
                    return;
                }

                snapshot.forEach((doc) => {
                    const user = doc.data(); const uid = doc.id;
                    const plan = user.plan || "Free";
                    const imgLimit = user.limits?.image ?? 5; const vidLimit = user.limits?.video ?? 0; const ttsLimit = user.limits?.tts ?? 5;
                    const imgAllowed = user.allowed?.image !== false; const vidAllowed = user.allowed?.video !== false; const ttsAllowed = user.allowed?.tts !== false;

                    const cardHtml = `
                        <div class="user-card" id="card-${uid}">
                            <div class="user-info">
                                <img src="${user.photoURL || 'https://via.placeholder.com/45'}" alt="Profile">
                                <div class="user-details">
                                    <div class="user-name">${user.name || 'Unknown User'}</div>
                                    <div class="user-email">${user.email || 'No Email'}</div>
                                </div>
                            </div>
                            <div class="plan-section">
                                <span>VIP Plan:</span>
                                <select class="plan-select" id="plan-${uid}">
                                    <option value="Free" ${plan === 'Free' ? 'selected' : ''}>Basic (Free)</option>
                                    <option value="Pro" ${plan === 'Pro' ? 'selected' : ''}>NEXIS Pro</option>
                                    <option value="Ultra" ${plan === 'Ultra' ? 'selected' : ''}>NEXIS Ultra</option>
                                </select>
                            </div>
                            <div class="feature-control">
                                <span class="feature-name">🎨 Image Gen</span>
                                <input type="number" class="limit-input" id="limit-img-${uid}" value="${imgLimit}">
                                <label class="switch"><input type="checkbox" id="allow-img-${uid}" ${imgAllowed ? 'checked' : ''}><span class="slider"></span></label>
                            </div>
                            <div class="feature-control">
                                <span class="feature-name">🎬 Video Gen</span>
                                <input type="number" class="limit-input" id="limit-vid-${uid}" value="${vidLimit}">
                                <label class="switch"><input type="checkbox" id="allow-vid-${uid}" ${vidAllowed ? 'checked' : ''}><span class="slider"></span></label>
                            </div>
                            <div class="feature-control">
                                <span class="feature-name">🔊 Voice (TTS)</span>
                                <input type="number" class="limit-input" id="limit-tts-${uid}" value="${ttsLimit}">
                                <label class="switch"><input type="checkbox" id="allow-tts-${uid}" ${ttsAllowed ? 'checked' : ''}><span class="slider"></span></label>
                            </div>
                            <button class="save-btn" onclick="saveUserData('${uid}')">💾 Save Changes</button>
                        </div>
                    `;
                    usersContainer.innerHTML += cardHtml;
                });
            });
        }

        async function saveUserData(uid) {
            const plan = document.getElementById(`plan-${uid}`).value;
            const imgLimit = parseInt(document.getElementById(`limit-img-${uid}`).value) || 0;
            const vidLimit = parseInt(document.getElementById(`limit-vid-${uid}`).value) || 0;
            const ttsLimit = parseInt(document.getElementById(`limit-tts-${uid}`).value) || 0;
            const imgAllowed = document.getElementById(`allow-img-${uid}`).checked;
            const vidAllowed = document.getElementById(`allow-vid-${uid}`).checked;
            const ttsAllowed = document.getElementById(`allow-tts-${uid}`).checked;

            try {
                await db.collection("users").doc(uid).set({
                    plan: plan,
                    limits: { image: imgLimit, video: vidLimit, tts: ttsLimit },
                    allowed: { image: imgAllowed, video: vidAllowed, tts: ttsAllowed }
                }, { merge: true });
                showToast();
            } catch (error) { alert("Error saving data!"); }
        }

        function showToast() {
            const toast = document.getElementById("toast"); toast.style.display = "block";
            setTimeout(() => { toast.style.display = "none"; }, 2500);
        }

        // =========================================================
        // 💬 PANEL 2: MESSENGER VIP CHAT (NEW)
        // =========================================================
        function loadVipChatUsers() {
            const userListContainer = document.getElementById('ms-user-list');
            db.collection("users").onSnapshot((snapshot) => {
                userListContainer.innerHTML = '';
                if(snapshot.empty) {
                    userListContainer.innerHTML = '<div style="text-align: center; padding: 20px; color: #64748b;">No users available.</div>';
                    return;
                }

                snapshot.forEach((doc) => {
                    const user = doc.data(); const uid = doc.id;
                    const userPhoto = user.photoURL || 'https://via.placeholder.com/45';
                    const userName = user.name || 'Unknown User';
                    const userEmail = user.email || 'No Email';

                    const item = document.createElement("div");
                    item.className = "ms-user-item";
                    item.id = `user-item-${uid}`;
                    item.innerHTML = `
                        <img src="${userPhoto}" alt="Profile">
                        <div class="ms-user-details">
                            <div class="ms-user-name">${userName}</div>
                            <div class="ms-user-email">${userEmail}</div>
                        </div>
                    `;
                    
                    item.onclick = () => openVipChat(uid, userName, userPhoto, userEmail);
                    userListContainer.appendChild(item);
                });
            });
        }

        function openVipChat(uid, name, photo, email) {
            activeChatUid = uid; activeChatName = name; activeChatEmail = email;

            document.querySelectorAll('.ms-user-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`user-item-${uid}`).classList.add('active');

            document.getElementById("ms-no-chat").style.display = "none";
            document.getElementById("ms-chat-area").style.display = "flex";

            document.getElementById("ms-active-img").src = photo;
            document.getElementById("ms-active-name").innerText = name;
            document.getElementById("ms-active-email").innerText = email;

            const container = document.getElementById("ms-messages");
            container.innerHTML = "<div style='text-align:center; color:#64748b; margin-top:20px;'>Loading chat...</div>";

            if (activeChatUnsubscribe) activeChatUnsubscribe();

            activeChatUnsubscribe = db.collection("pro_requests").where("userId", "==", uid)
                .onSnapshot(snapshot => {
                    container.innerHTML = "<div style='text-align:center; color:#64748b; margin-top:20px; margin-bottom: 20px;'>End-to-End Encrypted Admin Chat</div>";
                    
                    let requests = [];
                    snapshot.forEach(doc => { requests.push(doc.data()); });
                    requests.sort((a, b) => (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0));

                    requests.forEach(data => {
                        if (data.userPrompt && data.userPrompt !== "🔔 Admin Message") {
                            container.innerHTML += `<div class="ms-bubble ms-user-msg">${data.userPrompt.replace(/\n/g, '<br>')}</div>`;
                        } else if (data.userImage && !data.userPrompt) {
                            container.innerHTML += `<div class="ms-bubble ms-user-msg">(Image Attached)</div>`;
                        }
                        if (data.userImage) {
                            container.innerHTML += `<img src="${data.userImage}" class="ms-img" style="align-self: flex-start;">`;
                        }

                        if (data.adminReply) {
                            container.innerHTML += `<div class="ms-bubble ms-admin-msg">💎 <b>Admin:</b><br>${data.adminReply.replace(/\n/g, '<br>')}</div>`;
                        }
                        if (data.adminImage) {
                            container.innerHTML += `<img src="${data.adminImage}" class="ms-img" style="align-self: flex-end;">`;
                        }
                    });
                    
                    container.scrollTop = container.scrollHeight;
                });
        }

        async function sendAdminChatMsg() {
            if (!activeChatUid) return;

            const input = document.getElementById("admin-chat-input");
            const text = input.value.trim();
            const imgData = adminSelectedImage;

            if (!text && !imgData) return;
            
            input.value = "";
            removeAdminImage();

            try {
                // FIXED BUG: Admin's reply now properly attaches to the LATEST message, or creates a new one cleanly.
                const pendingSnapshot = await db.collection("pro_requests")
                    .where("userId", "==", activeChatUid)
                    .where("status", "==", "pending")
                    .get();
                
                const batch = db.batch();
                let updatedExisting = false;

                if (!pendingSnapshot.empty) {
                    // Sort pending requests to find the most recent one
                    let pendingDocs = [];
                    pendingSnapshot.forEach(doc => pendingDocs.push(doc));
                    pendingDocs.sort((a, b) => (a.data().timestamp?.seconds || 0) - (b.data().timestamp?.seconds || 0));

                    // Update ONLY the newest document with the reply
                    const lastDoc = pendingDocs[pendingDocs.length - 1];
                    batch.update(lastDoc.ref, {
                        adminReply: text || null,
                        adminImage: imgData || null,
                        status: "replied",
                        repliedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    updatedExisting = true;

                    // Set remaining older pending requests to "replied" to clear them out without moving them
                    for (let i = 0; i < pendingDocs.length - 1; i++) {
                        batch.update(pendingDocs[i].ref, { status: "replied" });
                    }
                }

                if (!updatedExisting) {
                    // Admin initiates chat
                    const newDocRef = db.collection("pro_requests").doc();
                    batch.set(newDocRef, {
                        userId: activeChatUid,
                        userName: activeChatName,
                        userEmail: activeChatEmail,
                        userPrompt: "🔔 Admin Message",
                        userImage: null,
                        adminReply: text || null,
                        adminImage: imgData || null,
                        status: "replied",
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }

                await batch.commit();

            } catch (error) {
                console.error("Send Error:", error);
                alert("Error sending message.");
            }
        }

        async function clearAdminChatHistory() {
            if (!activeChatUid) return;
            if(!confirm("Are you sure you want to delete ALL messages for this user?")) return;

            try {
                const snapshot = await db.collection("pro_requests").where("userId", "==", activeChatUid).get();
                const batch = db.batch();
                snapshot.docs.forEach(doc => { batch.delete(doc.ref); });
                await batch.commit();
                alert("Chat cleared successfully!");
            } catch(e) {
                alert("Failed to clear history.");
            }
        }

        function handleAdminImageSelect(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    adminSelectedImage = event.target.result;
                    document.getElementById("ms-preview-img").src = adminSelectedImage;
                    document.getElementById("ms-preview-box").style.display = "block";
                };
                reader.readAsDataURL(file);
            }
            e.target.value = '';
        }

        function removeAdminImage() {
            adminSelectedImage = null;
            document.getElementById("ms-preview-box").style.display = "none";
        }

        // =========================================================
        // ⚡ PANEL 3: API TESTER
        // =========================================================
        function appendAdminChat(text, isUser, engineName = null) {
            const chatBox = document.getElementById("admin-chat-box");
            let div = document.createElement("div");
            div.className = `bubble ${isUser ? 'admin-msg' : 'ai-msg'}`;
            let displayText = text.replace(/\n/g, '<br>');
            if (!isUser && engineName) { displayText += `<br><span class="engine-tag">🛡️ Active Engine: ${engineName}</span>`; }
            div.innerHTML = displayText;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        async function testAPI() {
            const input = document.getElementById("admin-test-input");
            const text = input.value.trim();
            if (!text) return;
            
            appendAdminChat(text, true); input.value = "";
            const loadingBubble = appendAdminChat("Testing Engine...", false);
            
            try {
                // Testing API uses default flash model
                const requestBody = { model: 'gemini-2.5-flash', contents: [{ role: "user", parts: [{ text: text }] }], aiMode: 'Flash' };
                const response = await fetch(BACKEND_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(requestBody) });
                const data = await response.json();
                loadingBubble.remove();
                
                if (data.candidates && data.candidates.length > 0) {
                    const aiText = data.candidates[0].content.parts[0].text;
                    const engineName = data.ai_source || "Unknown Engine"; 
                    appendAdminChat(aiText, false, engineName);
                } else { appendAdminChat("⚠️ Backend Error.", false); }
            } catch (err) { loadingBubble.remove(); appendAdminChat("⚠️ Network Error.", false); }
        }
    </script>
