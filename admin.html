<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS - Admin Panel</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; padding: 20px; }
        .request-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .user-info { font-weight: bold; color: #333; margin-bottom: 10px; }
        .user-prompt { background: #e3f2fd; padding: 10px; border-radius: 5px; margin-bottom: 15px; }
        .img-preview { max-width: 200px; border-radius: 5px; margin-bottom: 10px; display: block;}
        textarea { width: 100%; height: 80px; padding: 10px; border-radius: 5px; border: 1px solid #ccc; margin-bottom: 10px; }
        button { background: #1a73e8; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        button:hover { background: #1557b0; }
        hr { border: 0; border-top: 1px solid #eee; margin: 15px 0; }
        
        #login-section { text-align: center; margin-top: 50px; }
        #admin-content { display: none; }
    </style>
</head>
<body>

    <h2>NEXUS - Pro User Requests (Admin Panel)</h2>
    
    <!-- Login မဝင်ရသေးခင် ပေါ်မည့်အပိုင်း -->
    <div id="login-section">
        <p>Admin Panel ကို ဝင်ရောက်ရန် သင့် Google အကောင့်ဖြင့် Login ဝင်ပါ။</p>
        <button onclick="adminLogin()">Login with Google</button>
    </div>

    <!-- Login ဝင်ပြီးမှ ပေါ်မည့်အပိုင်း -->
    <div id="admin-content">
        <button onclick="adminLogout()" style="background: #dc3545; margin-bottom: 20px;">Logout ထွက်မည်</button>
        <div id="requests-container">Loading requests...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBuI_N7UY3HzLC1q4bTbr0pIjutn7oCez0",
            authDomain: "nexus-36961.firebaseapp.com",
            projectId: "nexus-36961",
            storageBucket: "nexus-36961.firebasestorage.app",
            messagingSenderId: "818963537476",
            appId: "1:818963537476:web:83e8b69fdf067001e62611"
        };
        
        if (!firebase.apps.length) { 
            firebase.initializeApp(firebaseConfig); 
        }
        const db = firebase.firestore();
        const auth = firebase.auth();

        // ⚠️ အစ်ကို့ Gmail ကို ဒီမှာ ထည့်သွင်းထားပါတယ်
        const ADMIN_EMAIL = "newtruckermyanmar1010@gmail.com"; 

        auth.onAuthStateChanged(user => {
            if (user) {
                // Admin Gmail ဟုတ်မဟုတ် စစ်ဆေးခြင်း
                if (user.email === ADMIN_EMAIL) {
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('admin-content').style.display = 'block';
                    loadRequests(); 
                } else {
                    alert("တောင်းပန်ပါသည်။ သင်သည် Admin မဟုတ်သောကြောင့် ဝင်ရောက်ခွင့် မရှိပါ။");
                    auth.signOut(); // Admin မဟုတ်လျှင် ကန်ထုတ်မည်
                }
            } else {
                document.getElementById('login-section').style.display = 'block';
                document.getElementById('admin-content').style.display = 'none';
            }
        });

        function adminLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(err => alert("Login Error: " + err.message));
        }

        function adminLogout() {
            if(confirm("Logout ထွက်မှာ သေချာပါသလား?")) auth.signOut();
        }

        function loadRequests() {
            const container = document.getElementById('requests-container');
            db.collection("pro_requests").where("status", "==", "pending")
              .onSnapshot((snapshot) => {
                  container.innerHTML = "";
                  if(snapshot.empty) {
                      container.innerHTML = "<p>လက်ရှိမှာ ဖြေစရာ Request အသစ်မရှိပါ။</p>";
                      return;
                  }
                  
                  snapshot.forEach((doc) => {
                      const data = doc.data();
                      const docId = doc.id;
                      
                      let html = `
                        <div class="request-card" id="card-${docId}">
                            <div class="user-info">User: ${data.userName} (${data.userEmail})</div>
                            <div class="user-prompt"><strong>Prompt:</strong> ${data.userPrompt || '(စာသားမပါ)'}</div>
                            ${data.userImage ? `<img src="${data.userImage}" class="img-preview" alt="User Image">` : ''}
                            
                            <hr>
                            <strong>Admin Reply (ပြန်စာ):</strong>
                            <textarea id="reply-text-${docId}" placeholder="User ကိုပြန်ပို့မည့် စာသားရိုက်ထည့်ပါ..."></textarea>
                            
                            <strong>Reply Image (ပြန်ပို့မည့်ပုံ ရှိပါက ရွေးပါ):</strong><br>
                            <input type="file" id="reply-img-${docId}" accept="image/*" style="margin-bottom: 10px;"><br>
                            
                            <button onclick="sendReply('${docId}')">Send Reply</button>
                        </div>
                      `;
                      container.innerHTML += html;
                  });
              }, (error) => {
                  alert("Data ဆွဲယူခွင့် မရှိပါ။ Error: " + error.message);
              });
        }

        function sendReply(docId) {
            const replyText = document.getElementById(`reply-text-${docId}`).value;
            const fileInput = document.getElementById(`reply-img-${docId}`);
            
            if(!replyText && fileInput.files.length === 0) {
                alert("ပြန်စာ သို့မဟုတ် ပုံ တစ်ခုခုထည့်ပေးပါ။");
                return;
            }

            const updateData = {
                adminReply: replyText,
                status: "replied",
                repliedAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            if (fileInput.files.length > 0) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    updateData.adminImage = e.target.result;
                    pushToFirebase(docId, updateData);
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                pushToFirebase(docId, updateData);
            }
        }

        function pushToFirebase(docId, updateData) {
            document.querySelector(`#card-${docId} button`).innerText = "Sending...";
            db.collection("pro_requests").doc(docId).update(updateData)
              .catch((error) => {
                  alert("Error sending reply: " + error);
              });
        }
    </script>
</body>
</html>
